repos:
  - repo: local
    hooks:
      - id: validate-skill-framework
        name: Validate Skill framework
        entry: python3 scripts/validate_repo.py
        language: system
        pass_filenames: false
      - id: check-sensitive-data
        name: Check sensitive data
        entry: python3 scripts/check_secrets.py
        language: system
        pass_filenames: true
