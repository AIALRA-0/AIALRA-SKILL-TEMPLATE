name: Validate Skill template

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Show Python version
        run: python3 --version
      - name: Validate universal template
        run: python3 scripts/validate_template.py
      - name: Run runtime and generator tests
        run: python3 -m unittest discover -s tests -v
      - name: Scan working tree for sensitive data
        run: python3 scripts/check_secrets.py
      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_ARCHIVE_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl --retry 3 --retry-all-errors --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_ARCHIVE_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
      - name: Scan complete Git history with Gitleaks
        run: >-
          "$RUNNER_TEMP/gitleaks" git --redact --config .gitleaks.toml --log-opts="--all" .
